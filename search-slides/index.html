  <script>
    const slides = [{"num":"1","content":"Search\nMSAI  348:  Intro  to  Artificial  Intelligence\nInstructor:  Mohammed  A.  Alam"},{"num":"2","content":"Intelligence,  insofar  the  application  of  its  artificial  variety  goes,  seems  to  be  about  making  decisions  or  \npredictions  given  a  circumstance  (loosely  “problem”).\nAny  decision-making,  any  prediction,  any  thought,  any  utterance...\n...can  be  thought  of  as  a  mapping  from  the  problem  to  a  solution  from  a  vast  solution  space.\nSuch  mapping  requires  some  operation.\nThe  operation  can  be  computation.  It  can  be  reasoning  like  we  do.  Or  it  can  be  search."},{"num":"3","content":"One  thing  seems  to  be  certain  is  that  all  the  operations  have  one  thing  in  common:\nThey  all  start  with  representation  of  whatever  needs  to  be  operated  on.\nRepresentation  can  take  many  forms.  They  can  be  words  in  a  language.  They  can  be  vectors  of  values  \nthat  represent  those  words.  They  can  be  pixels  in  an  image.  They  can  be  digitized  soundwaves.\nIt  all  starts  with  representation.  Let’s  look  at  one  from  machine  learning."},{"num":"4","content":"Say,  we  want  our  computer  to  learn  about  fish  and  we  care  only  about  these  features  of  fish:\n  Length  ―  small,  medium,  large    (3  values)\n  Width  ―  narrow,  wide      (2  values)\n  Shade  ―  dark,  light      (2  values)\n  Dotted  ―  yes,  no      (2  values)\n  Dorsal  fin  ―  yes,  no      (2  values)\n  Hazel  eyes  ―  yes,  no      (2  values)"},{"num":"5","content":"Here’s  a  machine  learning  dataset  showing  examples  or  instances  of  fish:\nHow  many  unique  instances  can  there  be?                        \nLengthWidthShadeDottedDorsal  FinHazel  EyesLabel\nsmallnarrowdarkyesnoyessalmon\nmediumnarrowdarknonoyestrout\nsmallwidelightnoyesyesbass\nlargewidedarkyesyesnosalmon\nsmallnarrowdarkyesnonosalmon"},{"num":"6","content":"Here’s  a  machine  learning  dataset  showing  examples  or  instances  of  fish:\nHow  many  unique  instances  can  there  be?                        3  ×  2  ×  2  ×  2  ×  2  ×  2  =  96\nLengthWidthShadeDottedDorsal  FinHazel  EyesLabel\nsmallnarrowdarkyesnoyessalmon\nmediumnarrowdarknonoyestrout\nsmallwidelightnoyesyesbass\nlargewidedarkyesyesnosalmon\nsmallnarrowdarkyesnoyessalmon"},{"num":"7","content":"Imagine  a  table  with  96  rows,  each  a  unique  instance.  The  salmon  are  indicated  by  a  1.\nLengthWidthShadeDottedDorsal  FinHazel  EyesLabel\nsmallnarrowdarkyesnoyes1\nmediumnarrowdarknonoyes0\nsmallwidelightnoyesyes0\nlargewidedarkyesyesno1\n.....................\nlargenarrowlightnoyesno1\nEach  such  table  denotes  a  concept.  How  many  unique  concepts  can  there  be?"},{"num":"8","content":"Imagine  a  table  with  96  rows,  each  a  unique  instance.  The  salmon  are  indicated  by  a  1.\nLengthWidthShadeDottedDorsal  FinHazel  EyesLabel\nsmallnarrowdarkyesnoyes1\nmediumnarrowdarknonoyes0\nsmallwidelightnoyesyes0\nlargewidedarkyesyesno1\n.....................\nlargenarrowlightnoyesno1\nEach  such  table  denotes  a  concept.  How  many  unique  concepts  can  there  be?                        2"},{"num":"9","content":"Now  imagine  a  table  with    2"},{"num":"10","content":"Now  imagine  a  table  with    2"},{"num":"11","content":"Now  imagine  a  decision  or  thought  is  plucked  out  of  the  hypothesis  space  we  just  saw.\nImagine  a  search  of  that  hypothesis  space.\nIf  a  mere  handful  of  features  can  spawn  such  a  gigantic  number  of  hypotheses,  how  much  more  \ngigantic  is  the  hypothesis  space  we  humans  search?  Or  do  we?\nWe’ll  answer  that  question  later,  but  let’s  see  how  algorithmic  search  can  be  performed  and  when."},{"num":"12","content":"Search  can  be  done  upfront  (given  complete  information  and  feasibility).\nThat  would  be  akin  to  planning  followed  by  execution.\nOr  actions  can  be  interleaved  with  search.\nSearch  can  occur  in  a  geographical  space:  think  finding  a  route  from  point  A  to  point  B.\nSearch  can  also  be  fruitful  for  abstract  spaces  (e.g.,  concept  spaces).\nWhere  in  the  real  world  is  search  used?  In  a  variety  of  scenarios:\n  Path  finding,  file  system  traversal,  social  network  connection  finding,  game  move  finding,  \nchain-of-thought  exploration,  logistics,  planning  and  exploration  in  robotics,  and  much  more!"},{"num":"14","content":"8-Puzzle  moves  can  be  represented  as  a  tree.\nOne  possible  solution:\n  1–3–7–14–26–46"},{"num":"15","content":"Breadth-first  Search  (BFS)  –  one  way  to  search  the  tree\nBreadth\nAnd  so  on...\nThis  this  one\nThen  this  level\nFirst  search  the  breadth  of  this  level"},{"num":"16","content":"Depth-first  Search  (DFS)  –  another  way  to  search  the  tree\nAnd  so  on...\nThis  this  one\nThen  this  node\nFirst  search  this  node\nDepth"},{"num":"17","content":"Tree  Search\nGoal:  Find  the  path  from  the  start  state  to  the  goal  state\nStrategy:  Methodically  search  until  the  goal  is  reached\nShared  theme  of  all  tree  search  methods  (algorithms):\n1.Check  node  for  goal.\n2.If  goal  not  found,  expand  node.\n3.Repeat.\nCall  it  the  Check-and-expand  Routine"},{"num":"18","content":"States  vs.  Nodes\nA  state  is  a  (representation  of)  a  configuration  of  the  world.\nA  node  is  a  data  structure  constituting  part  of  a  search  tree.  \nIt  typically  includes  state,  parent  node,  action,  path  cost,    \nand  depth.\nThe  expand  function  yields  new  nodes,  either  by  reading  \nfrom  a  map  or  by  using  a  successor  function  to  create  new  \nnodes  and  fill  in  the  various  fields.\nState\nNode\ndepth  =  6\npath  cost  =  7\nparent\nstate"},{"num":"19","content":"Tree  Search  Algorithm  Pseudocode"},{"num":"20","content":"There’s  this  thing  called  the  fringe  (aka  frontier).\nIt’s  what  stores  the  nodes  slated  to  be  checked.\nWe  check  a  node  for  the  goal.  If  we  don’t  find  it,  we  expand  it  and  get  child  nodes.\nWe  check  again.  We  expand  again.\nWe  rinse  and  repeat.\nBut  which  nodes  do  we  check?\nAnswer:  The  ones  in  the  fringe."},{"num":"21","content":"How  the  fringe  is  tracked  differentiates  between  BFS  and  DFS:\nDFS  uses  a  stack\nLIFO  (Last  in,  first  out)\nBFS  uses  a  queue\nFIFO  (First  in,  first  out)\nThe  first  one  in  will  be  the  first  one  out.\nThe  last  one  going  on  the  stack  will  be  the  first  one  out.\nPeople  in  queue  at  the  polls\nPlates  in  a  stack"},{"num":"22","content":"Let’s  do  BFS.  Say,  our  goal  state  is  what’s  there  in  node  16.\nRemember,  we’ll  use  a  queue.\nBreadth\nWe  push  node  1  into  our  empty  fringe.\nWe  pop  our  fringe  and  get  1.\nWe  check  1.  We  don’t  find  the  goal.\nWe  expand  and  get  2,  3,  4.\nWe  push  them  into  our  fringe.\nFringe  now:\n  ???"},{"num":"23","content":"Let’s  do  BFS.  Say,  our  goal  state  is  what’s  there  in  node  16.\nRemember,  we’ll  use  a  queue.\nBreadth\nWe  push  node  1  into  our  empty  fringe.\nWe  pop  our  fringe  and  get  1.\nWe  check  1.  We  don’t  find  the  goal.\nWe  expand  and  get  2,  3,  4.\nWe  push  them  into  our  fringe.\nFringe  now:\n  2,  3,  4"},{"num":"24","content":"Breadth\nWe  pop  our  fringe  and  get  2.\nWe  check  2.  We  don’t  find  the  goal.\nWe  expand  and  get  5.\nWe  push  it  into  our  fringe.\nFringe  now:\n  ???"},{"num":"25","content":"Breadth\nWe  pop  our  fringe  and  get  2.\nWe  check  2.  We  don’t  find  the  goal.\nWe  expand  and  get  5.\nWe  push  it  into  our  fringe.\nFringe  now:\n  3,  4,  5"},{"num":"26","content":"Breadth\nWe  pop  our  fringe  and  get  3.\nWe  check  3.  We  don’t  find  the  goal.\nWe  expand  and  get  6,  7,  8.\nWe  push  them  into  our  fringe.\nFringe  now:\n  ???"},{"num":"27","content":"Breadth\nWe  pop  our  fringe  and  get  3.\nWe  check  3.  We  don’t  find  the  goal.\nWe  expand  and  get  6,  7,  8.\nWe  push  them  into  our  fringe.\nFringe  now:\n  4,  5,  6,  7,  8"},{"num":"28","content":"Breadth\nWe  pop  our  fringe  and  get  4.\nWe  check  4.  We  don’t  find  the  goal.\nWe  expand  and  get  9.\nWe  push  it  into  our  fringe.\nFringe  now:\n  ???"},{"num":"29","content":"Breadth\nWe  pop  our  fringe  and  get  4.\nWe  check  4.  We  don’t  find  the  goal.\nWe  expand  and  get  9.\nWe  push  it  into  our  fringe.\nFringe  now:\n  5,  6,  7,  8,  9\n\nWe  pop  our  fringe  and  get  5.\nWe  check  5.  We  don’t  find  the  goal.\nWe  expand  and  get  10,  11.\nWe  push  them  into  our  fringe."},{"num":"30","content":"Breadth\nFringe  now:\n  ???\n\nWe  pop  our  fringe  and  get  5.\nWe  check  5.  We  don’t  find  the  goal.\nWe  expand  and  get  10,  11.\nWe  push  them  into  our  fringe."},{"num":"31","content":"Breadth\nFringe  now:\n  6,  7,  8,  9,  10,  11\n\nWe  pop  our  fringe  and  get  8.\nWe  check  8.  We  don’t  find  the  goal.\nWe  expand  and  get  16,  17.\nWe  push  them  into  our  fringe."},{"num":"32","content":"Breadth\nFringe  now:\n  ???\nAfter  a  while,  we’re  done  checking  7.\nNote  that  in  the  fringe,  7  is  followed  by  8.\n\nWe  pop  our  fringe  and  get  8.\nWe  check  8.  We  don’t  find  the  goal.\nWe  expand  and  get  16,  17.\nWe  push  them  into  our  fringe."},{"num":"33","content":"Breadth\nFringe  now:\n  9,  10,  11,  12,  13,  14,  15,  16,  17\nAfter  a  while,  we’re  done  checking  7.\nNote  that  in  the  fringe,  7  is  followed  by  8.\n\nAfter  a  while  more,  we  check  16.  \nWe  find  our  goal  state  and  end  our  search."},{"num":"34","content":"Breadth\nWhat  remains  in  the  fringe?\nWith  BFS,  we’ve  always  expanded  the  shallowest  unexpanded  node."},{"num":"35","content":"Now  let’s  do  DFS.  Say,  our  goal  state  is  again  what’s  there  in  node  16.\nRemember,  we’ll  use  a  stack  now.\nWe  push  node  1  onto  our  empty  fringe.\nWe  pop  our  fringe  and  get  1.\nWe  check  1.  We  don’t  find  the  goal.\nWe  expand  and  get  2,  3,  4.\nWe  push  them  onto  our  fringe.\nFringe  now:\n  [  2,  3,  4\nDepth\nStack  bottom"},{"num":"36","content":"Halt!!!  Hold  your  horses!\nWhat  do  we  get  if  we  pop  our  fringe?\nWe  get  4.  At  some  point,  we’ll  get  3.  Later,  2.\nSo,  we  end  up  searching  right  to  left.\nHow  do  we  search  left  to  right?\nWe  push  onto  the  fringe  right  to  left.\nLet’s  do  that.\nFringe  now:\n  [  4,  3,  2\nDepth\n\nWe  pop  our  fringe  and  get  2.\nWe  check  2.  We  don’t  find  the  goal.\nWe  expand  and  get  5.\nWe  push  it  onto  our  fringe."},{"num":"37","content":"Fringe  now:\n  [  ???\nDepth\n\nWe  pop  our  fringe  and  get  2.\nWe  check  2.  We  don’t  find  the  goal.\nWe  expand  and  get  5.\nWe  push  it  onto  our  fringe."},{"num":"38","content":"Fringe  now:\n  [  4,  3,  5\nDepth\n\nWe  pop  our  fringe  and  get  5.\nWe  check  5.  We  don’t  find  the  goal.\nWe  expand  and  get  10,  11.\nWe  push  them  onto  our  fringe."},{"num":"39","content":"Fringe  now:\n  [  ???\nDepth\n\nWe  pop  our  fringe  and  get  5.\nWe  check  5.  We  don’t  find  the  goal.\nWe  expand  and  get  10,  11.\nWe  push  them  onto  our  fringe."},{"num":"40","content":"Fringe  now:\n  [  4,  3,  11,  10\nDepth\n\nWe  pop  our  fringe  and  get  10.\nWe  check  10.  We  don’t  find  the  goal.\nWe  expand  and  get  20.\nWe  push  it  onto  our  fringe."},{"num":"41","content":"......"},{"num":"42","content":"Fringe  now:\n  [  4,  3,  11,  20\nDepth\nNotice  that  we’re  going  down  the  leftmost  branch.\nSo  far,  we’ve  checked  1,  2,  and  5.\n\nWe  pop  our  fringe  and  get  20.\nWe  check  20.  We  don’t  find  the  goal.\nWe  expand  and  get  34,  35.\nWe  push  them  onto  our  fringe."},{"num":"43","content":"Fringe  now:\n  [  ???\nDepth\n\nWe  pop  our  fringe  and  get  20.\nWe  check  20.  We  don’t  find  the  goal.\nWe  expand  and  get  34,  35.\nWe  push  them  onto  our  fringe."},{"num":"44","content":"Fringe  now:\n  [  4,  3,  11,  35,  34\nDepth\n\nFringe  now:\n  [  ???\nWe  pop  our  fringe  and  get  34.\nWe  check  34.  We  don’t  find  the  goal.\nWe  CAN’T  expand  more."},{"num":"45","content":"Depth\n\nFringe  now:\n  [  4,  3,  11,  35\nWe  pop  our  fringe  and  get  34.\nWe  check  34.  We  don’t  find  the  goal.\nWe  CAN’T  expand  more."},{"num":"46","content":"Depth\n\nFringe  now:\n  [  ???\nWe  pop  our  fringe  and  get  35.\nWe  check  35.  We  don’t  find  the  goal.\nWe  CAN’T  expand  more  here  either."},{"num":"47","content":"Depth\nNotice  that  we’re  done  going  down  the  leftmost  branch.\nWe’ve  now  shifted  focus  to  the  right  branch  below  20.\n\nFringe  now:\n  [  4,  3,  11\nWe  pop  our  fringe  and  get  35.\nWe  check  35.  We  don’t  find  the  goal.\nWe  CAN’T  expand  more  here  either."},{"num":"48","content":"Depth\nNotice  that  we’re  done  going  down  the  leftmost  branch.\nWe’ve  now  shifted  focus  to  the  right  branch  below  20.\n\nFringe  now:\n  [  ???\nWe  pop  our  fringe  and  get  11.\nWe  check  11.  We  don’t  find  the  goal.\nWe  expand  and  get  21,  22,  23.\nWe  push  them  onto  our  fringe."},{"num":"49","content":"Depth\nWe’ve  now  searched  the  entire  left  branch  under  5.\nAs  before,  we’ll  now  shift  focus  to  the  right  branch  under  5.\n\nFringe  now:\n  [  4,  3,  23,  22,  21\nWe  pop  our  fringe  and  get  11.\nWe  check  11.  We  don’t  find  the  goal.\nWe  expand  and  get  21,  22,  23.\nWe  push  them  onto  our  fringe."},{"num":"50","content":"Depth\nWe’ve  now  searched  the  entire  left  branch  under  5.\nAs  before,  we’ll  now  shift  focus  to  the  right  branch  under  5.\n\nWe  could  choose  to  do  the  same  from  \nright  to  left."},{"num":"51","content":"Depth\nAs  before,  we’ll  now  go  down  the  left  branch  under  11,  then  right.\nSo,  we’re  searching  left  to  right.\nThe  main  idea  is  that  we  search  down  \nthe  depth  to  the  deepest  level  we  can  \nreach  on  the  left  before  coming  back  \nup  to  search  on  the  right."},{"num":"52","content":"Depth\nAfter  a  while  more,  we  check  16.  \nWe  find  our  goal  state  and  end  our  search.\nWhat  remains  in  the  fringe?\nWith  DFS,  we’ve  always  expanded  the  deepest  unexpanded  node."},{"num":"53","content":"Why  do  both  BFS  and  DFS  and  not  just  one?\nIt  has  to  do  with  memory  and  computation  speed.\nAs  such,  we  worry  about  space  complexity  and  time  complexity.\nBFS  and  DFS  differ  in  both  ways.\nWe  worry  about  completeness  and  optimality  as  well."},{"num":"54","content":"Our  worries,  tabulated:\nThe  worryWhat  it  means  for  BFS  and  DFS\nSpaceMax  no.  of  nodes  stored  in  memory  any  time\nTimeApprox.  no.  of  nodes  generated  (not  necessarily  examined)\nComplete?If  a  solution  exists,  the  algorithm  will  find  it.\nOptimal?A  found  solution  will  be  the  best/optimal  (often  shallowest)."},{"num":"55","content":"BFS  and  DFS  compared:\nSpace  and  time  complexities  use  Big  O  notation,  depicting  the  worst  case.\nb  =  branching  factor\nd  =  depth  of  shallowest  solution\nm  =  max  depth  of  tree\nThe  worryWhat  it  means  for  BFSWhat  it  means  for  DFS\nSpace\nO(b\nd+1\n)O(bm)\nTime\nO(b\nd+1\n)O(b\nm\n)\nComplete?\nYesNo\nOptimal?\nYesNo"},{"num":"56","content":"BFS  and  DFS  compared:\nIn  plain  English,\n  BFS  has  a  high  memory  requirement.\n  DFS  is  neither  necessarily  complete  nor  optimal.\nSo,  if  we  have  plenty  of  memory,  do  we  just  go  with  BFS?\nIf  memory  is  scant,  do  we  simply  go  with  DFS?\nNot  quite  in  either  case.  Let’s  see  a  couple  of  examples."},{"num":"57","content":"A  tree  for  8-Puzzle  graphs  all  possible  move  sequences.\nOnly  some  paths  from  root  to  leaf  will  lead  to  the  goal.  We  want  that  path.\nWe  don’t  need  an  exhaustive  search  of  the  whole  tree.  We  can  use  DFS.\nA  tree  for  your  LinkedIn  graphs  all  your  connections,  level  (degree)  by  level.\nWe  want  to  find  the  shortest  path  to  a  connection.\nWe  can  do  BFS.  If  we  find  the  connection,  we  know  that’s  the  shortest  path."},{"num":"58","content":"We  want  this:\n  Optimality  and  completeness  of  BFS  +  memory-friendliness  of  DFS\nTwo  ideas  to  do  that:\n1.  Depth-limited  DFS\n2.  Iterative  Deepening"},{"num":"59","content":"Depth-limited  DFS  is  DFS  but  with  a  depth  limit  of  L  specified.\nDepth-limited  DFS  characteristics:\nThe  worryDepth-limited  DFS\nSpaceO(bL)\nTimeO(b\nL\n)\nComplete?Not  if  solution  is  longer  than  L\nOptimal?No,  for  the  same  reason  why  DFS  isn’t\nb  =  branching  factor"},{"num":"60","content":"Iterative  Deepening  is  Depth-limited  DFS  with  iterative  increase  in  depth,  i.e.,  0,  1,  2,  ...  ,  ∞.\nBlends  the  benefits  of  BFS  and  DFS:\n§Searches  in  a  similar  order  to  BFS  (optimal)\n§But  has  the  memory  requirements  of  DFS\nWill  find  a  solution  when  L  is  the  depth  of  the  shallowest  goal."},{"num":"61","content":"Iterative  Deepening  is  wasteful,  but  that’s  not  such  a  bad  thing,  really.\nOverall,  cost  ends  up  being  O(b\nd\n)\nLower-depth  repeated  search  cost  is  dominated  by  that  at  the  highest  depth.\nCost  for  L  =  0  is    1\nCost  for  L  =  1  is  1  +  b\nCost  for  L  =  2  is  1  +  b  +  b"},{"num":"62","content":"Iterative  Deepening  DFS  characteristics:\nThe  worryDepth-limited  DFS\nSpaceO(bd)\nTimeO(b\nd\n)\nComplete?Yes\nOptimal?Yes\nb  =  branching  factor\nd  =  depth  of  shallowest  solution"},{"num":"63","content":"BFS  and  DFS  are  uninformed  search  strategies.\nThey  use  only  the  information  available  in  the  basic  problem  definition,  i.e.,  the  tree  of  possible  states.\nThey  don’t  look  at  the  states  themselves  except  to  ask:    Is  this  the  goal?  Have  I  been  here  before?\nThe  worryBFSDFSDepth-limited  DFSIter’ve  Deepening\nSpace\nO(b\nd+1\n)O(bm)\nO(bL)O(bd)\nTime\nO(b\nd+1\n)O(b\nm\n)\nO(b\nL\n)O(b\nd\n)\nComplete?\nYesNo\nNoYes\nOptimal?\nYesNo\nNoYes\nIn  summary:"},{"num":"64","content":"Can  we  do  better  than  uninformed  search?  Can  we  make  an  intelligent  (think  informed)  choice?\nWe  can  heuristics.\nAn  algorithm  is  a  set  of  well-defined  (unambiguous)  steps  for  solving  a  problem.\nIt  generally  comes  to  a  stop.\nIt  usually  aims  to  achieve  optimality,  completeness,  accuracy,  or  precision.\nA  heuristic  is  a  rule  of  thumb  or  a  set  of  those.\nIt  usually  trades  the  italicized  terms  above  for  speed.\nIt  is  expected  to  give  a  good  enough  result  in  a  short  time."},{"num":"65","content":"Two  heuristics  for  8-Puzzle"},{"num":"66","content":"Best-first  Search\nIdea:  Use  an  evaluation  function  f(n)  for  each  node\n§Estimate  of  goodness\n§Estimate  best  unexpanded  node\nImplementation:  Order  nodes  in  fringe  in  decreasing  order  of  desirability\nSpecial  cases:\n§Greedy  best-first  search\n§A*  search"},{"num":"67","content":"Greedy  Best-first  Search  (GBFS)\nIdea:  Expand  the  best  node  in  the  fringe\nEvaluation  function:  f(n)  =  h(n)\n§h(n)  =  estimated  cost  from  n  to  goal\nJust  like  BFS  uses  a  queue  and  DFS  uses  a  stack,  GBFS  uses  a  priority-queue.\nA  priority-queue  stays  sorted  based  on  the  priority  of  its  items,  e.g.,  from  smallest  to  largest  distance."},{"num":"68","content":"A*  Search\nIdea:  Avoid  expanding  paths  that  are  already  expensive\nEvaluation  function:  f(n)  =  g(n)  +  h(n)\n§g(n)  =  cost  so  far  to  reach  n\n§h(n)  =  estimated  cost  from  n  to  goal\n§f(n)  =  estimated  total  cost  of  path  through  n  to  goal\nevaluation  of  the  desirability  of  n"},{"num":"69","content":"A*  Search  outperforms  BFS  and  DFS  for  8-Puzzle\nA*    S e a rc h\nBFS\nDFS"},{"num":"70","content":"In  Romania,  what  are  ways  to  go  from  Sibiu  to  Bucharest?  Easy  to  figure  out.\n§Sibiu  —  Fagaras  —  Bucharest\n§Sibiu  —  Rimnicu  Vilcea  —  Pitesti  —  Bucharest\n§Sibiu  —  Rimnicu  Vilcea  —  Craiova  —  Pitesti  —  Bucharest"},{"num":"71","content":"But  what  about  Oradea  to  Neamt?  Not  so  easy  now,  is  it?\nWell,  we  can  use  A*  Search."},{"num":"72","content":"How  can  search  handle  combinatorial  explosion?\nSearch  can  utilize  heuristics  that  make  the  task  tractable.\nA*  uses  straight-line  distance  (aka  Euclidean  distance)  as  a  heuristic.\nLet’s  explore  the  beautiful  A*  Search  algorithm.\nThe  following  slides  are  based  on  Karl  Matthes’  nice  article,  Pathfinding:  A*  Search  Algorithm."},{"num":"73","content":"Let’s  A*  Search  through  a  map.\n36.1\n036.1\nA\n36.1\n036.1\nB\n36.1\n036.1\nC\n36.1\n036.1\nD\n36.1\n036.1\nE\n36.1\n036.1\nF\n36.1\n036.1\nG\n36.1\n036.1\nH\n36.1"},{"num":"74","content":"We  add  A  to  the  Open  set.  It’s  our  current  vertex.\nWe  measure  A’s  distance  from  the  start,  which  is  0.  We  record  it  in  the  table.\nWe  also  record  the  heuristic  distance  from  A  to  L,  which  is  36.1.\nWe  then  record  the  sum,  which  is  also  36.1.\nVertexDistance  \nfrom  Start\nHeuristic  \nDistance\nSumPrevious  \nVertex\nA036.136.1\nB\nC\nD\nE\nF\nG\nH\nI\nJ\nK\nL\n36.1\n036.1\nA\n36.1\n036.1\nB\n36.1\n036.1\nC\n36.1\n036.1\nD\n36.1\n036.1\nE\n36.1\n036.1\nF\n36.1\n036.1\nG\n36.1\n036.1\nH\n36.1"},{"num":"75","content":"We  now  want  to  look  at  A’s  neighbors,  so  we  add  B,  E,  and  F  to  the  Open  set.\nWe  record  the  distance  from  the  start  for  each  node:  10  for  B  and  E,  14  for  F.\nWe  record  the  heuristic  distances  and  the  sums.\nWe  record  A  as  each  node’s  previous  vertex.\nVertexDistance  \nfrom  Start\nHeuristic  \nDistance\nSumPrevious  \nVertex\nA036.136.1\nB1028.338.3A\nC\nD\nE1031.641.6A\nF1422.436.4A\nG\nH\nI\nJ\nK\nL\n36.1\n036.1\nA\n38.3\n1028.3\nB\n36.1\n036.1\nC\n36.1\n036.1\nD\n41.6\n1031.6\nE\n36.4\n1422.4\nF\n36.1\n036.1\nG\n36.1\n036.1\nH\n36.1"},{"num":"76","content":"Now  that  everything  involving  A  is  complete,  we  move  it  to  the  Closed  set.\nWe  now  need  a  new  current  vertex.  We  look  at  the  sums  of  B,  E,  and  F.\nF  has  the  lowest  sum,  so  it’s  our  new  current  vertex.\nVertexDistance  \nfrom  Start\nHeuristic  \nDistance\nSumPrevious  \nVertex\nA036.136.1\nB1028.338.3A\nC\nD\nE1031.641.6A\nF1422.436.4A\nG\nH\nI\nJ\nK\nL\n36.1\n036.1\nA\n38.3\n1028.3\nB\n36.1\n036.1\nC\n36.1\n036.1\nD\n41.6\n1031.6\nE\n36.4\n1422.4\nF\n36.1\n036.1\nG\n36.1\n036.1\nH\n36.1"},{"num":"77","content":"We  now  want  to  look  at  F’s  8  neighbors:  A,  B,  C,  E,  G,  I,  J,  and  K.\nA  is  in  Closed.  We  add  the  other  7  to  Open.  It  already  has  B  and  E,  so  we  end  up  adding  the  other  5.\nWe  record  the  distances,  sums,  and  previous  vertices  of  all  7.\n  The  values  for  B  and  E  don’t  change.  Why?  \nVertexDistance  \nfrom  Start\nHeuristic  \nDistance\nSumPrevious  \nVertex\nA036.136.1\nB1028.338.3A\nC2822.450.4F\nD\nE1031.641.6A\nF1422.436.4A\nG2414.138.1F\nH\nI283058F\nJ242044F\nK281038F\nL\nOpen  =  {B,  C,  E,  F,  G,  I,  J,  K}\nClosed  =  {A}\n36.1\n036.1\nA\n38.3\n1028.3\nB\n50.4\n2822.4\nC\n36.1\n036.1\nD\n41.6\n1031.6\nE\n36.4\n1422.4\nF\n38.1\n2414.1\nG\n36.1\n036.1\nH"},{"num":"78","content":"Since  B  is  F’s  neighbor,  B’s  distance  from  the  start  via  F  is  14  +  10  =  24.\nHowever,  B  already  has  a  shorter  distance  from  the  start.  As  such,  we  don’t  update  B.\nLikewise  for  E.\nVertexDistance  \nfrom  Start\nHeuristic  \nDistance\nSumPrevious  \nVertex\nA036.136.1\nB1028.338.3A\nC2822.450.4F\nD\nE1031.641.6A\nF1422.436.4A\nG2414.138.1F\nH\nI283058F\nJ242044F\nK281038F\nL\nOpen  =  {B,  C,  E,  F,  G,  I,  J,  K}\nClosed  =  {A}\n36.1\n036.1\nA\n38.3\n1028.3\nB\n50.4\n2822.4\nC\n36.1\n036.1\nD\n41.6\n1031.6\nE\n36.4\n1422.4\nF\n38.1\n2414.1\nG\n36.1\n036.1\nH"},{"num":"79","content":"VertexDistance  \nfrom  Start\nHeuristic  \nDistance\nSumPrevious  \nVertex\nA036.136.1\nB1028.338.3A\nC2822.450.4F\nD\nE1031.641.6A\nF1422.436.4A\nG2414.138.1F\nH\nI283058F\nJ242044F\nK281038F\nL\nOpen  =  {B,  C,  E,  G,  I,  J,  K}\nClosed  =  {A,  F}\nNow  that  everything  involving  F  is  complete,  we  move  it  to  the  Closed  set.\nWe  now  need  a  new  current  vertex  again.  K  has  the  lowest  sum,  so  it’s  our  new  current  vertex.\n(When  two  nodes  tie  on  the  sum,  we  can  use  the  heuristic  distance  to  break  the  tie.)\n36.1\n036.1\nA\n38.3\n1028.3\nB\n50.4\n2822.4\nC\n36.1\n036.1\nD\n41.6\n1031.6\nE\n36.4\n1422.4\nF\n38.1\n2414.1\nG\n36.1\n036.1\nH"},{"num":"80","content":"VertexDistance  \nfrom  Start\nHeuristic  \nDistance\nSumPrevious  \nVertex\nA036.136.1\nB1028.338.3A\nC2822.450.4F\nD\nE1031.641.6A\nF1422.436.4A\nG2414.138.1F\nH421052K\nI283058F\nJ242044F\nK281038F\nL38038K\nOpen  =  {B,  C,  E,  G,  I,  J,  K}\nClosed  =  {A,  F}\n36.1\n036.1\nA\n38.3\n1028.3\nB\n50.4\n2822.4\nC\n36.1\n036.1\nD\n41.6\n1031.6\nE\n36.4\n1422.4\nF\n38.1\n2414.1\nG"},{"num":"81","content":"VertexDistance  \nfrom  Start\nHeuristic  \nDistance\nSumPrevious  \nVertex\nA036.136.1\nB1028.338.3A\nC2822.450.4F\nD\nE1031.641.6A\nF1422.436.4A\nG2414.138.1F\nH421052K\nI283058F\nJ242044F\nK281038F\nL38038K\nOpen  =  {B,  C,  E,  G,  I,  J}\nClosed  =  {A,  F,  K}\n36.1\n036.1\nA\n38.3\n1028.3\nB\n50.4\n2822.4\nC\n36.1\n036.1\nD\n41.6\n1031.6\nE\n36.4\n1422.4\nF\n38.1\n2414.1\nG"},{"num":"82","content":"VertexDistance  \nfrom  Start\nHeuristic  \nDistance\nSumPrevious  \nVertex\nA036.136.1\nB1028.338.3A\nC2822.450.4F\nD\nE1031.641.6A\nF1422.436.4A\nG2414.138.1F\nH421052K\nI283058F\nJ242044F\nK281038F\nL38038K\nOpen  =  {B,  C,  E,  G,  I,  J}\nClosed  =  {A,  F,  K}\n36.1\n036.1\nA\n38.3\n1028.3\nB\n50.4\n2822.4\nC\n36.1\n036.1\nD\n41.6\n1031.6\nE\n36.4\n1422.4\nF\n38.1\n2414.1\nG"},{"num":"83","content":"All  trees  are  graphs,  but  not  all  graphs  are  trees.\nA  tree  is  a  Directed  Acyclic  Graph  (DAG)  with  one  parent  per  node.\nGraphs  but  not  treesTrees  and  also  graphs"},{"num":"84","content":"The  graph  shown  here  is  not  a  tree  but  can  be  traversed  like  one,  which  is  tree  search.\nCaveat:  The  same  node  may  be  visited  more  than  once.\nThe  graph  can  also  be  searched  using  graph  search.\nCaveat:  Memory  cost  to  maintain  a  closed  list  to  avoid  repeated  visits\nTree  search  and  graph  search  have  to  do  with  types  of  heuristics:\n1.Admissible  heuristics\n2.Consistent  heuristics\n3.Inconsistent"},{"num":"85","content":"Admissible  heuristics:\nA  heuristic,  h(n),  is  admissible  if  for  every  node  n,  h(n)  ≤  h*(n),  where  h*(n)  is  the  true  cost  to  reach  \nthe  goal  state  from  n.\nIt  never  overestimates  the  cost  to  reach  the  goal,  i.e.,  it  is  optimistic.\nExample:\n  h\nSLD\n(n)  (straight-line  distance  or  “as  the  crow  flies”)  never  overestimates  the  actual  driving  \ndistance."},{"num":"86","content":"Consistent  heuristics:\nA  heuristic,  h(n),  is  consistent,  or  monotone,  if  for  every  node  n  and  each  successor  p,\n  h(n)  ≤  c(n,  p)  +  h(p),  where  c(n,  p)  is  the  actual  cost  to  reach  p  from  n.\nIn  other  words,  while  moving  along  a  given  path,  the  total  estimated  cost  for  that  path,  including  the  \nreal  distance  discovered  so  far  +  the  remaining  estimated  distance,  never  gets  smaller."},{"num":"87","content":"Some  facts  about  heuristics:\n§Most  heuristics  are  admissible  and  consistent.\n§If  h(n)  is  admissible,  A*  is  guaranteed  to  give  an  optimal  solution.\n§If  h(n)  is  consistent,  A*  Tree  Search  and  A*  Graph  Search  both  work.\n§If  h(n)  is  inconsistent,  only  A*  Tree  Search  will  give  an  optimal  solution.\n•Graph  search,  having  not  completely  carried  through  some  paths,  may  miss  the  optimal  \npath  in  this  case."},{"num":"88","content":"Adversarial  search  is  one  way  in  which  computers  play  games.\nA  two-player  game  (think  chess)  typically  has  an  adversary,  hence  the  name.\nStrategic  thinking  is  key  in  playing  such  games.\nDoes  strategic  thinking  constitute  intelligence?"},{"num":"89","content":"Here’s  Tic-Tac-Toe  as  a  graph  of  moves:\nUtility\nTe r m i n a l    s t a t e\nSuccessor  function\nInitial  state"},{"num":"90","content":"Pseudocode  for  Minimax,  an  optimal-strategy  algorithm  for  games  like  Tic-Tac-Toe:"},{"num":"91","content":"Max(imizer)  and  Min(imizer)  both  assume  each  other  is  playing  optimally.\nMax’s  goal  is  to  maximize  the  value  of  its  every  action.\nMin’s  goal  is  to  minimize  the  value  of  Max’s  every  action.\nMinimax  applies  the  assumption  and  the  goal  to  each  move  of  the  game  to  foresee  every  move  \nsequence  resulting  in  a  win  or  a  loss,  picking  moves  accordingly.\nThe  beauty  of  Minimax  is  in  its  simple  elegance.  \nNote  that  Max  and  Min  are  not  the  namesakes  of  Minimax.  Instead,  Minimax  seeks  to  minimize,  via  \nMax’s  actions,  the  maximum  loss  posed  by  Min’s  strategy."},{"num":"92","content":"Minimax  has  a  shortcoming:  searching  the  whole  tree  is  redundant.\nBut  depth-limiting  this  DFS-style  search  may  miss  out  on  the  good  moves  that  are  beyond  the  frontier  \nof  cut-off.  This  is  the  horizon  effect.\nWe  can  prune  the  tree:  eliminate  parts  of  the  tree  from  consideration  using  Alpha-Beta  Pruning:\n  It  prunes  away  branches  that  can’t  possibly  influence  the  final  decision.\nConsider  a  node  n:\n  If  a  player  has  a  better  choice  m  (at  a  parent  or  further  up),  then  n  will  never  be  reached.\n  So,  once  we  know  enough  about  n  by  looking  at  some  successors,  we  can  prune  it."},{"num":"93","content":"Pseudocode  for  Minimax  with  Alpha-Beta  Pruning:"},{"num":"94","content":"Walkthrough  of  Minimax  with  Alpha-Beta  Pruning:\na  =  -¥\nb  =  ¥\na  =  -¥\nb  =  ¥\na  =  -¥\nb  =  ¥\na  =  -¥\nb  =  ¥\nMax\nMin"},{"num":"95","content":"Walkthrough  of  Minimax  with  Alpha-Beta  Pruning:"},{"num":"96","content":"Of  all  those  concepts,  the  table  above  is  a  concept  of  salmon,  at  least  per  the  given  features."},{"num":"97","content":"Walkthrough  of  Minimax  with  Alpha-Beta  Pruning:"},{"num":"98","content":"Walkthrough  of  Minimax  with  Alpha-Beta  Pruning:"},{"num":"99","content":"Walkthrough  of  Minimax  with  Alpha-Beta  Pruning:"},{"num":"100","content":"Walkthrough  of  Minimax  with  Alpha-Beta  Pruning:"},{"num":"101","content":"Walkthrough  of  Minimax  with  Alpha-Beta  Pruning:"},{"num":"102","content":"Walkthrough  of  Minimax  with  Alpha-Beta  Pruning:"},{"num":"103","content":"Walkthrough  of  Minimax  with  Alpha-Beta  Pruning:"},{"num":"104","content":"Walkthrough  of  Minimax  with  Alpha-Beta  Pruning:"},{"num":"105","content":"Walkthrough  of  Minimax  with  Alpha-Beta  Pruning:"},{"num":"106","content":"Walkthrough  of  Minimax  with  Alpha-Beta  Pruning:"},{"num":"107","content":"What  did  we  see  about  searching  through  a  space  of  possibilities?\nWe  saw  a  variety  of  search  methods  with  their  own  pros  and  cons.\nAbove  all,  we  got  a  sense  of  the  suitability  of  each  method  to  a  problem."}];
    const total = 106;
    const el = document.getElementById('slide');
    const counterEl = document.getElementById('counter');
    const slideNumEl = document.getElementById('slideNum');

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    let index = 0;

    function render() {
      const s = slides[index];
      el.innerHTML = '<h2>Slide ' + escapeHtml(s.num) + '</h2>' + escapeHtml(s.content);
      counterEl.textContent = (index + 1) + ' / ' + total;
      slideNumEl.textContent = s.num + ' of 107';
    }

    function go(delta) {
      index = Math.max(0, Math.min(index + delta, total - 1));
      render();
    }

    document.getElementById('prev').addEventListener('click', () => go(-1));
    document.getElementById('next').addEventListener('click', () => go(1));
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') { go(-1); e.preventDefault(); }
      if (e.key === 'ArrowRight' || e.key === ' ') { go(1); e.preventDefault(); }
    });

    render();
  </script>
