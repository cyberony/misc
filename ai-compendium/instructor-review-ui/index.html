<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Perspectives — Quiz review</title>
    <link rel="stylesheet" href="/review/styles.css?v=20260408" />
  </head>
  <body>
    <header class="review-topbar" aria-label="Site">
      <a id="reviewHomeLink" class="review-topbar-home" href="/" aria-label="Home — MSAI · CAT compendium">
        <span class="review-topbar-home-icon" aria-hidden="true">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="m15 18-6-6 6-6"></path>
          </svg>
        </span>
        <span>Home</span>
      </a>
    </header>
    <header class="app-header">
      <h1>AI Perspectives — student responses</h1>
      <div class="assignment-picker">
        <label for="assignmentSelect">Assignment</label>
        <div class="assignment-picker-row">
          <select id="assignmentSelect" aria-label="Choose assignment to grade"></select>
          <button type="button" class="btn-rename-assignment" id="btnRenameAssignment" title="Rename assignment (list only)" aria-label="Rename assignment">
            <svg class="btn-rename-assignment-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 20h9"></path>
              <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
            </svg>
          </button>
          <button type="button" class="btn-delete-assignment" id="btnDeleteAssignment" title="Delete selected assignment" aria-label="Delete selected assignment">
            <svg class="btn-delete-assignment-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 6h18"></path>
              <path d="M8 6V4h8v2"></path>
              <path d="M19 6l-1 14H6L5 6"></path>
              <path d="M10 11v6"></path>
              <path d="M14 11v6"></path>
            </svg>
          </button>
        </div>
      </div>
      <span class="meta" id="metaLine"></span>
      <span class="assignment-due assignment-due-wrap" id="assignmentDueWrap" hidden>
        <button
          type="button"
          class="due-pill due-pill--clickable"
          id="assignmentDuePill"
          aria-label="Set assignment due date"
        ></button>
      </span>
      <div class="actions">
        <button type="button" class="primary" id="btnUploadAssignment">Upload assignment data</button>
        <button type="button" id="btnExport">Export all (JSON)</button>
        <label class="file-btn">
          Import JSON
          <input type="file" id="importInput" accept="application/json,.json" />
        </label>
      </div>
    </header>

    <div class="layout">
      <div class="pane-left" id="studentList"></div>
      <aside class="pane-right">
        <h2 id="commentTitle">Comments</h2>
        <p class="student-submission-meta" id="studentSubmissionMeta" hidden></p>
        <div class="comment-fields">
          <div class="comment-row">
            <div class="comment-actions">
              <button
                type="button"
                class="icon-tool"
                id="btnDictate"
                disabled
                aria-label="Record and transcribe"
              >
                <svg
                  class="btn-svg"
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
                  <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                  <line x1="12" y1="19" x2="12" y2="23" />
                  <line x1="8" y1="23" x2="16" y2="23" />
                </svg>
              </button>
              <button
                type="button"
                class="icon-tool icon-tool--assist"
                id="btnAssist"
                disabled
                aria-pressed="false"
                aria-label="Instruction mode for rough transcript: next mic tells the AI how to edit the first box"
                title="Click to start AI-instruction recording for the rough transcript; this same button turns into Stop while recording."
              >
<svg class="btn-svg" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <rect x="5.5" y="7" width="13" height="13" rx="2.5" />
                  <path d="M12 7V4" />
                  <circle cx="12" cy="3" r="1.5" />
                  <path d="M5.5 12c-1.4 0-2.5 1.1-2.5 2.5S4.1 17 5.5 17" />
                  <path d="M18.5 12c1.4 0 2.5 1.1 2.5 2.5S19.9 17 18.5 17" />
                  <circle cx="9.5" cy="12.5" r="1.3" />
                  <circle cx="14.5" cy="12.5" r="1.3" />
                  <line x1="10" y1="16" x2="14" y2="16" />
                </svg>
              </button>
              <button
                type="button"
                class="icon-tool export-pref-thumb"
                id="btnExportLikeTranscribe"
                disabled
                aria-pressed="false"
                aria-label="Use rough transcript for export"
                title="Use rough transcript for export (JSON export uses this when selected)"
              >
                <svg
                  class="vote-icon-svg"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path
                    d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"
                  />
                </svg>
              </button>
            </div>
            <textarea
              id="transcribeBox"
              class="comment-area"
              disabled
              aria-label="Transcription"
            ></textarea>
          </div>
          <div class="comment-row">
            <div class="comment-actions">
              <button
                type="button"
                class="icon-tool"
                id="btnPolish"
                disabled
                aria-label="Polish new transcription"
              >
                <svg
                  class="btn-svg"
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path
                    d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.2 1.2 0 0 0 1.72 0L21.64 5.36a1.2 1.2 0 0 0 0-1.72Z"
                  />
                  <path d="m14 7 3 3" />
                  <path d="M5 6v4" />
                  <path d="M19 14v4" />
                  <path d="M10 2v2" />
                  <path d="M7 8H3" />
                  <path d="M21 16h-4" />
                  <path d="M11 3H9" />
                </svg>
              </button>
              <button
                type="button"
                class="icon-tool icon-tool--assist"
                id="btnAssistPolish"
                disabled
                aria-pressed="false"
                aria-label="Instruction mode for polished note: next mic tells the AI how to edit the second box"
                title="Click to start AI-instruction recording for the polished note; this same button turns into Stop while recording."
              >
<svg class="btn-svg" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <rect x="5.5" y="7" width="13" height="13" rx="2.5" />
                  <path d="M12 7V4" />
                  <circle cx="12" cy="3" r="1.5" />
                  <path d="M5.5 12c-1.4 0-2.5 1.1-2.5 2.5S4.1 17 5.5 17" />
                  <path d="M18.5 12c1.4 0 2.5 1.1 2.5 2.5S19.9 17 18.5 17" />
                  <circle cx="9.5" cy="12.5" r="1.3" />
                  <circle cx="14.5" cy="12.5" r="1.3" />
                  <line x1="10" y1="16" x2="14" y2="16" />
                </svg>
              </button>
              <button
                type="button"
                class="icon-tool export-pref-thumb"
                id="btnExportLikePolish"
                disabled
                aria-pressed="false"
                aria-label="Use polished note for export"
                title="Use polished note for export (JSON export uses this when selected)"
              >
                <svg
                  class="vote-icon-svg"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path
                    d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"
                  />
                </svg>
              </button>
            </div>
            <textarea id="polishBox" class="comment-area" disabled aria-label="Polished"></textarea>
          </div>
        </div>
      </aside>
    </div>

    <div class="status-toast" id="toast" role="status"></div>

    <div id="uploadModal" class="review-modal" hidden aria-hidden="true">
      <div class="review-modal-backdrop" id="uploadModalBackdrop"></div>
      <div class="review-modal-panel" role="dialog" aria-labelledby="uploadModalTitle" aria-modal="true">
        <div class="review-modal-head">
          <h2 id="uploadModalTitle" class="review-modal-title">Upload assignment data</h2>
          <button type="button" class="review-modal-close" id="uploadModalClose" aria-label="Close">✕</button>
        </div>
        <div class="review-modal-fields">
          <label class="review-modal-label">
            Assignment report CSV
            <input type="file" id="uploadCsvFile" accept=".csv,text/csv" />
          </label>
          <label class="review-modal-label">
            Assignment ID <span class="review-modal-optional">(optional — for Canvas upload later)</span>
            <input type="text" id="uploadId" class="review-modal-input" autocomplete="off" placeholder="e.g., Assignment 7 (1759267)" />
          </label>
        </div>
        <div class="review-modal-actions">
          <button type="button" class="primary" id="uploadModalSubmit">Upload</button>
        </div>
      </div>
    </div>

    <div id="confirmDeleteDialog" class="confirm-dialog" hidden role="dialog" aria-modal="true" aria-live="assertive">
      <div class="confirm-dialog-top">
        <span id="confirmDeleteMessage" class="confirm-dialog-msg"></span>
        <button type="button" class="confirm-dialog-x" id="confirmDeleteClose" aria-label="Close">✕</button>
      </div>
      <div class="confirm-dialog-actions">
        <button type="button" class="confirm-dialog-danger" id="confirmDeleteOk">Delete</button>
      </div>
    </div>

    <div id="renameAssignmentModal" class="review-modal" hidden aria-hidden="true">
      <div class="review-modal-backdrop" id="renameAssignmentModalBackdrop"></div>
      <div class="review-modal-panel" role="dialog" aria-labelledby="renameAssignmentModalTitle">
        <div class="review-modal-head">
          <h2 class="review-modal-title" id="renameAssignmentModalTitle">Rename assignment</h2>
          <button type="button" class="review-modal-close" id="renameAssignmentModalClose" aria-label="Close">✕</button>
        </div>
        <p class="review-modal-hint">Shown in the assignment list only. Does not change files on disk or the assignment id.</p>
        <label class="review-modal-label">Display name <input type="text" id="renameAssignmentInput" class="review-modal-input" autocomplete="off" /></label>
        <div class="review-modal-actions">
          <button type="button" class="primary" id="renameAssignmentSave">Save</button>
        </div>
      </div>
    </div>

    <div id="dueDateModal" class="review-modal" hidden aria-hidden="true">
      <div class="review-modal-backdrop" id="dueDateModalBackdrop"></div>
      <div class="review-modal-panel" role="dialog" aria-labelledby="dueDateModalTitle">
        <div class="review-modal-head">
          <h2 class="review-modal-title" id="dueDateModalTitle">Assignment due date</h2>
          <button type="button" class="review-modal-close" id="dueDateModalClose" aria-label="Close">✕</button>
        </div>
        <p class="review-modal-hint">Calendar day in UTC (YYYY-MM-DD). Used for on-time vs late in the student panel.</p>
        <label class="review-modal-label">Due date <input type="date" id="dueDateInput" class="review-modal-input" /></label>
        <div class="review-modal-actions">
          <button type="button" id="dueDateModalClear">Clear</button>
          <button type="button" class="primary" id="dueDateModalSave">Save</button>
        </div>
      </div>
    </div>

    <div class="app-version-stamp" aria-hidden="true">v6.2.0</div>
    <script src="/review/app.js?v=20260408"></script>
  </body>
</html>
