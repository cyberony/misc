<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MSAI · CAT — Alumni</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="icon" type="image/png" href="/assets/cat.png" />
  </head>
  <body>
    <div class="bg" aria-hidden="true"></div>
    <header class="topbar bug-reports-topbar">
      <div class="brand">
        <a class="brand-logo-link" href="/" aria-label="Home">
          <img class="logo" src="/assets/cat.png" alt="CAT logo" />
        </a>
        <div>
          <h1 class="bug-reports-page-heading">
            <span class="brand-kicker">MSAI · CAT</span>
            <span class="bug-reports-heading-sep" aria-hidden="true">|</span>
            <span class="bug-reports-heading-page">Alumni</span>
          </h1>
        </div>
      </div>
      <div class="auth-strip">
        <a class="auth-link auth-link-with-icon" href="/">
          <span class="auth-link-icon" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="m15 18-6-6 6-6"></path>
            </svg>
          </span>
          <span>Home</span>
        </a>
      </div>
    </header>

    <main class="bug-reports-shell">
      <p class="bug-reports-gate muted">The alumni directory isn’t available here right now.</p>
    </main>
    <div class="app-version-stamp" aria-hidden="true">v6.5.0</div>
  </body>
</html>
