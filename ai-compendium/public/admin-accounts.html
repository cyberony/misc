<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MSAI · CAT — Account roles</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="icon" type="image/png" href="/assets/cat.png" />
  </head>
  <body>
    <div class="bg" aria-hidden="true"></div>
    <header class="topbar bug-reports-topbar">
      <div class="brand">
        <a class="brand-logo-link" href="/" aria-label="Home">
          <img class="logo" src="/assets/cat.png" alt="CAT logo" />
        </a>
        <div>
          <h1 class="bug-reports-page-heading">
            <span class="brand-kicker">MSAI · CAT</span>
            <span class="bug-reports-heading-sep" aria-hidden="true">|</span>
            <span class="bug-reports-heading-page">Account roles</span>
          </h1>
          <p class="subtitle">Set user, superuser, and admin roles</p>
        </div>
      </div>
      <div class="auth-strip">
        <a class="auth-link auth-link-with-icon" href="/">
          <span class="auth-link-icon" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="m15 18-6-6 6-6"></path>
            </svg>
          </span>
          <span>Home</span>
        </a>
      </div>
    </header>

    <main class="bug-reports-shell admin-accounts-shell">
      <p id="adminAccountsGate" class="bug-reports-gate muted" aria-live="polite">Checking access…</p>
      <div id="adminAccountsToolbar" class="bug-reports-toolbar" hidden>
        <div class="content-search">
          <div class="search">
            <span class="search-icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.3-4.3" />
              </svg>
            </span>
            <input
              id="adminUserSearch"
              type="search"
              placeholder="Search email or name…"
              aria-label="Search accounts"
              autocomplete="off"
            />
          </div>
        </div>
      </div>
      <section id="adminAccountsSection" class="admin-accounts-section" hidden>
        <div id="adminUserList" class="admin-user-list bug-reports-list"></div>
      </section>
    </main>

    <div class="app-version-stamp" aria-hidden="true">v6.3.0</div>
    <script src="/admin-accounts.js"></script>
  </body>
</html>
