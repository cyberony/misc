<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MSAI · CAT — Feedback</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="icon" type="image/png" href="/assets/cat.png" />
  </head>
  <body>
    <div class="bg" aria-hidden="true"></div>
    <header class="topbar bug-reports-topbar">
      <div class="brand">
        <a class="brand-logo-link" href="/" aria-label="Home">
          <img class="logo" src="/assets/cat.png" alt="CAT logo" />
        </a>
        <div>
          <h1 class="bug-reports-page-heading">
            <span class="brand-kicker">MSAI · CAT</span>
            <span class="bug-reports-heading-sep" aria-hidden="true">|</span>
            <span class="bug-reports-heading-page">Feedback</span>
          </h1>
          <p class="subtitle">Bug reports and feature requests from the compendium</p>
        </div>
      </div>
      <div class="auth-strip">
        <a class="auth-link auth-link-with-icon" href="/">
          <span class="auth-link-icon" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="m15 18-6-6 6-6"></path>
            </svg>
          </span>
          <span>Home</span>
        </a>
      </div>
    </header>

    <main class="bug-reports-shell">
      <p id="bugReportsGate" class="bug-reports-gate muted" aria-live="polite">Checking access…</p>
      <div id="bugReportsToolbar" class="bug-reports-toolbar" hidden>
        <div class="content-search">
          <div class="search">
            <span class="search-icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.3-4.3" />
              </svg>
            </span>
            <input
              id="bugReportsSearch"
              type="search"
              placeholder="Search title, description, area, contact, ref (B1, F2)…"
              aria-label="Search feedback"
              autocomplete="off"
            />
          </div>
        </div>
      </div>
      <div id="bugReportsList" class="bug-reports-list" hidden></div>
    </main>

    <div class="app-version-stamp" aria-hidden="true">v6.1.2</div>
    <script src="/bug-reports.js"></script>
  </body>
</html>
