<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MSAI · CAT — Reminders</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="icon" type="image/png" href="/assets/cat.png" />
  </head>
  <body>
    <div class="bg" aria-hidden="true"></div>
    <header class="topbar bug-reports-topbar">
      <div class="brand">
        <a class="brand-logo-link" href="/" aria-label="Home">
          <img class="logo" src="/assets/cat.png" alt="CAT logo" />
        </a>
        <div>
          <h1 class="bug-reports-page-heading">
            <span class="brand-kicker">MSAI · CAT</span>
            <span class="bug-reports-heading-sep" aria-hidden="true">|</span>
            <span class="bug-reports-heading-page">Reminders</span>
          </h1>
          <p class="subtitle">Email reminders when they’re due</p>
        </div>
      </div>
      <div class="auth-strip">
        <a class="auth-link auth-link-with-icon" href="/">
          <span class="auth-link-icon" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="m15 18-6-6 6-6"></path>
            </svg>
          </span>
          <span>Home</span>
        </a>
      </div>
    </header>

    <main class="bug-reports-shell reminders-shell">
      <p id="remindersGate" class="bug-reports-gate muted" aria-live="polite">Checking access…</p>
      <div id="remindersLayout" class="reminders-layout" hidden>
        <div class="content-plus-row reminders-plus-row">
          <div class="add-resource-cluster">
            <button
              id="reminderAddBtn"
              class="fab-add"
              type="button"
              aria-label="Add a reminder"
              title="Add a reminder"
            >
              <span class="fab-add-plus" aria-hidden="true">+</span>
            </button>
            <label for="reminderAddBtn" class="add-resource-hint">Add a reminder</label>
          </div>
          <div class="content-search reminders-search-wrap">
            <div class="search">
              <span class="search-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="11" cy="11" r="8" />
                  <path d="m21 21-4.3-4.3" />
                </svg>
              </span>
              <input
                id="remindersSearch"
                type="search"
                placeholder="Search title, text, date…"
                aria-label="Search reminders"
                autocomplete="off"
              />
            </div>
            <button
              id="remindersArchiveToggle"
              type="button"
              class="icon-btn reminders-archive-toggle"
              aria-label="Show archived reminders"
              title="Show archived reminders"
              aria-pressed="false"
            >
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="4" rx="1"></rect>
                <path d="M5 8h14v11a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V8z"></path>
                <path d="M10 12h4"></path>
              </svg>
            </button>
          </div>
        </div>
        <div id="remindersList" class="bug-reports-list"></div>
      </div>
    </main>

    <div id="reminderAddModal" class="modal" hidden aria-hidden="true">
      <div class="modal-card">
        <div class="modal-head">
          <h2 id="reminderModalTitle">New reminder</h2>
          <button type="button" class="icon-btn" id="reminderAddModalClose" aria-label="Close">✕</button>
        </div>
        <div class="modal-body">
          <p class="muted reminders-compose-hint">
            Tell us what to remind you about and when, and we’ll email you. Saving reads the date and time from your
            text—if you don’t specify a time, we use 9:00&nbsp;AM <strong>Chicago time</strong> on that calendar day.
          </p>
          <textarea
            id="reminderNlInput"
            class="reminders-textarea"
            rows="5"
            placeholder='e.g. Remind me April 12 that I need to email Jordan about the practicum'
            aria-label="Reminder"
            autocomplete="off"
          ></textarea>
          <p id="reminderNlPreview" class="muted reminders-nl-preview" hidden aria-live="polite"></p>
          <button type="button" class="btn small primary reminders-add-btn" id="reminderNlBtn">Add reminder</button>
          <p id="reminderNlError" class="reminders-error" hidden role="alert"></p>
        </div>
      </div>
    </div>

    <div class="app-version-stamp" aria-hidden="true">v6.4.0</div>
    <script src="/reminders.js"></script>
  </body>
</html>
