<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MSAI · CAT — Alumni</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="icon" type="image/png" href="/assets/cat.png" />
  </head>
  <body>
    <div class="bg" aria-hidden="true"></div>
    <header class="topbar bug-reports-topbar">
      <div class="brand">
        <a class="brand-logo-link" href="/" aria-label="Home">
          <img class="logo" src="/assets/cat.png" alt="CAT logo" />
        </a>
        <div>
          <h1 class="bug-reports-page-heading">
            <span class="brand-kicker">MSAI · CAT</span>
            <span class="bug-reports-heading-sep" aria-hidden="true">|</span>
            <span class="bug-reports-heading-page">Alumni</span>
          </h1>
          <p class="subtitle">Directory from the marketing spreadsheet.</p>
        </div>
      </div>
      <div class="auth-strip">
        <a class="auth-link auth-link-with-icon" href="/">
          <span class="auth-link-icon" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="m15 18-6-6 6-6"></path>
            </svg>
          </span>
          <span>Home</span>
        </a>
      </div>
    </header>

    <main class="bug-reports-shell alumni-shell">
      <p id="alumniGate" class="bug-reports-gate muted" aria-live="polite">Checking access…</p>
      <div id="alumniMetaBlock" class="alumni-meta-block muted" hidden>
        <span id="alumniMeta" class="alumni-header-meta" role="status"></span>
        <button type="button" id="alumniDownloadXlsx" class="alumni-download-xlsx">
          Download .xlsx
        </button>
      </div>
      <div id="alumniTableWrap" class="alumni-table-wrap" hidden>
        <table class="alumni-table" id="alumniTable">
          <thead>
            <tr>
              <th scope="col">
                <button
                  type="button"
                  class="alumni-th-btn"
                  data-sort-key="graduationTerm"
                  aria-label="Sort by grad term"
                >Grad term<span class="alumni-sort-ind" aria-hidden="true"></span></button>
              </th>
              <th scope="col">
                <button type="button" class="alumni-th-btn" data-sort-key="name">Name<span class="alumni-sort-ind" aria-hidden="true"></span></button>
              </th>
              <th scope="col">
                <button type="button" class="alumni-th-btn" data-sort-key="company">Company<span class="alumni-sort-ind" aria-hidden="true"></span></button>
              </th>
              <th scope="col">
                <button type="button" class="alumni-th-btn" data-sort-key="title">Title<span class="alumni-sort-ind" aria-hidden="true"></span></button>
              </th>
              <th scope="col">
                <button type="button" class="alumni-th-btn" data-sort-key="industry">Industry<span class="alumni-sort-ind" aria-hidden="true"></span></button>
              </th>
              <th scope="col">
                <button type="button" class="alumni-th-btn" data-sort-key="personalEmail">Email<span class="alumni-sort-ind" aria-hidden="true"></span></button>
              </th>
              <th scope="col">
                <button type="button" class="alumni-th-btn" data-sort-key="capstone">Capstone<span class="alumni-sort-ind" aria-hidden="true"></span></button>
              </th>
              <th scope="col">
                <button type="button" class="alumni-th-btn" data-sort-key="internship">Internship<span class="alumni-sort-ind" aria-hidden="true"></span></button>
              </th>
              <th scope="col">
                <button type="button" class="alumni-th-btn" data-sort-key="practicum">Practicum<span class="alumni-sort-ind" aria-hidden="true"></span></button>
              </th>
            </tr>
          </thead>
          <tbody id="alumniTbody"></tbody>
        </table>
      </div>
    </main>

    <div class="app-version-stamp" aria-hidden="true">v6.5.0</div>
    <script src="/alumni.js"></script>
  </body>
</html>
