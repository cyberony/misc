<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset password · MSAI Compendium</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="icon" type="image/png" href="/assets/cat.png" />
  </head>
  <body>
    <div class="bg" aria-hidden="true"></div>
    <main class="reset-password-shell">
      <div class="modal-card reset-password-card">
        <div class="modal-head">
          <div>
            <h1>Set a new password</h1>
            <p id="resetSubtitle" class="subtitle">Choose a strong password for your account.</p>
          </div>
        </div>
        <form id="resetForm" class="modal-body">
          <label>
            New password (required)
            <div class="password-input-wrap">
              <input id="resetPassword" name="password" type="password" autocomplete="new-password" required minlength="8" />
              <button id="resetPwToggle" type="button" class="password-toggle-btn" aria-label="Show password" title="Show password">
                <span class="password-toggle-icon-wrap" aria-hidden="true">
                  <svg class="password-toggle-eye-open-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg class="password-toggle-eye-off-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </span>
              </button>
            </div>
          </label>
          <label>
            Confirm new password (required)
            <div class="password-input-wrap">
              <input id="resetPasswordConfirm" name="confirmPassword" type="password" autocomplete="new-password" required minlength="8" />
              <button id="resetPwConfirmToggle" type="button" class="password-toggle-btn" aria-label="Show confirm password" title="Show confirm password">
                <span class="password-toggle-icon-wrap" aria-hidden="true">
                  <svg class="password-toggle-eye-open-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg class="password-toggle-eye-off-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </span>
              </button>
            </div>
            <p id="resetPasswordConfirmError" class="auth-email-field-error" hidden role="alert"></p>
          </label>
          <div id="resetPasswordRules" class="password-rules">
            <p class="password-rules-intro">Password must meet all of:</p>
            <ul class="password-rules-list" aria-live="polite">
              <li id="reset-pw-req-length" class="password-rule-item">At least 8 characters</li>
              <li id="reset-pw-req-number" class="password-rule-item">At least one number</li>
              <li id="reset-pw-req-upper" class="password-rule-item">At least one uppercase letter</li>
              <li id="reset-pw-req-special" class="password-rule-item">At least one special character</li>
            </ul>
          </div>
          <p id="resetError" class="auth-error" hidden></p>
          <div class="form-actions">
            <a class="btn ghost" href="/">Back to app</a>
            <button class="btn primary" type="submit">Update password</button>
          </div>
        </form>
      </div>
    </main>
    <div class="app-version-stamp" aria-hidden="true">v6.5.1</div>
    <script>
      (function () {
        const PASSWORD_SPECIAL_REGEX = /[!@#$%^&*()_+\-=[\]{}|;':",.<>?/~`]/;
        function validatePasswordClient(password) {
          if (!password || password.length < 8) return 'Password must be at least 8 characters';
          if (!/[0-9]/.test(password)) return 'Password must include at least one number';
          if (!/[A-Z]/.test(password)) return 'Password must include at least one uppercase letter';
          if (!PASSWORD_SPECIAL_REGEX.test(password)) return 'Password must include at least one special character';
          return null;
        }
        function updateRules(password) {
          const p = password || '';
          function set(id, met) {
            const el = document.getElementById(id);
            if (el) el.classList.toggle('met', met);
          }
          set('reset-pw-req-length', p.length >= 8);
          set('reset-pw-req-number', /[0-9]/.test(p));
          set('reset-pw-req-upper', /[A-Z]/.test(p));
          set('reset-pw-req-special', PASSWORD_SPECIAL_REGEX.test(p));
        }

        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const errEl = document.getElementById('resetError');
        const confirmErrEl = document.getElementById('resetPasswordConfirmError');
        const form = document.getElementById('resetForm');
        const sub = document.getElementById('resetSubtitle');

        if (!token) {
          sub.textContent = 'This link is missing a token. Request a new reset email from the app.';
          form.hidden = true;
          errEl.hidden = false;
          errEl.textContent = 'Invalid or expired reset link.';
          return;
        }

        const pwInput = document.getElementById('resetPassword');
        const pwConfirmInput = document.getElementById('resetPasswordConfirm');
        function clearConfirmMismatch() {
          if (!confirmErrEl) return;
          confirmErrEl.hidden = true;
          confirmErrEl.textContent = '';
        }
        pwInput.addEventListener('input', () => updateRules(pwInput.value));
        pwInput.addEventListener('input', clearConfirmMismatch);
        pwConfirmInput.addEventListener('input', clearConfirmMismatch);
        updateRules('');

        function wireToggle(btn, input, showLabel, hideLabel) {
          btn.addEventListener('click', function () {
            const show = input.type === 'password';
            input.type = show ? 'text' : 'password';
            this.classList.toggle('showing', show);
            this.setAttribute('aria-label', show ? hideLabel : showLabel);
            this.setAttribute('title', show ? hideLabel : showLabel);
          });
        }
        wireToggle(document.getElementById('resetPwToggle'), pwInput, 'Show password', 'Hide password');
        wireToggle(
          document.getElementById('resetPwConfirmToggle'),
          pwConfirmInput,
          'Show confirm password',
          'Hide confirm password',
        );

        form.addEventListener('submit', async function (e) {
          e.preventDefault();
          errEl.hidden = true;
          clearConfirmMismatch();
          const password = String(pwInput.value || '');
          const confirmPassword = String(pwConfirmInput.value || '');
          const pwErr = validatePasswordClient(password);
          if (pwErr) {
            errEl.hidden = false;
            errEl.textContent = pwErr;
            return;
          }
          if (password !== confirmPassword) {
            if (confirmErrEl) {
              confirmErrEl.hidden = false;
              confirmErrEl.textContent = 'Passwords do not match.';
            }
            return;
          }
          const res = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ token, newPassword: password }),
          });
          let data = {};
          try {
            data = await res.json();
          } catch (_) {}
          if (!res.ok) {
            errEl.hidden = false;
            errEl.textContent = data.error || 'Could not reset password.';
            return;
          }
          window.location.href = '/?reset=ok';
        });
      })();
    </script>
  </body>
</html>
